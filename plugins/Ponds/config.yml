# =============================================
#   PondsPlugin Configuration
# =============================================

# Name of the void world that holds all pond islands
world-name: ponds_world

# How far apart each island is spaced (in blocks)
# 500 means island #0 is at x=0, island #1 at x=500, etc.
island-spacing: 500

# The Y level at which islands are generated
island-y: 64

# Starter chest contents (item material names)
# See: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html
starter-items:
  - OAK_SAPLING
  - SUGAR_CANE
  - LILY_PAD
  - SAND
  - BUCKET
  - BREAD
